spring.datasource.url=jdbc:postgresql://localhost:5432/devplatform
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.prometheus.access=unrestricted

# JWT issuer URI from your OIDC provider (Okta, Auth0, Keycloak, Google, etc.)
# spring.security.oauth2.resourceserver.jwt.issuer-uri=https://your-idp.example.com/