name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Test backend
        run: mvn test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  platform-artifacts:
    name: Platform artifact validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Build backend image
        run: docker build -t dev-platform-backend:test .
      - name: Build frontend image
        run: docker build -t dev-platform-frontend:test frontend
      - name: Lint Helm chart
        run: helm lint infra/helm/dev-platform
      - name: Validate Terraform
        working-directory: infra/terraform
        run: |
          terraform fmt -check
          terraform init -backend=false
          terraform validate
