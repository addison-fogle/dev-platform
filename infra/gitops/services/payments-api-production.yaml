apiVersion: platform.dev/v1alpha1
kind: ServiceDeployment
metadata:
  name: payments-api-production
  namespace: dev-platform
spec:
  serviceName: payments-api
  environment: production
  namespace: payments-prod
  image: ghcr.io/example/payments-api:v1.2.3
  replicas: 3
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      memory: 512Mi
  rollout:
    strategy: rolling
    maxUnavailable: 1
  policy:
    requireImmutableTag: true
    requireOwner: true
