groups:
  - name: dev-platform-api
    rules:
      - alert: DevPlatformHighApiErrorRate
        expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Dev Platform API is returning elevated 5xx responses.

      - alert: DevPlatformDeploymentFailures
        expr: increase(deployments_status_transitions_total{to="FAILED"}[15m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Multiple deployments have failed recently.

      - alert: DevPlatformRollbackSpike
        expr: increase(deployments_rollback_created_total[30m]) > 2
        for: 5m
        labels:
          severity: info
        annotations:
          summary: Rollbacks are occurring more frequently than expected.

      - alert: DevPlatformPodRestarts
        expr: increase(kube_pod_container_status_restarts_total{namespace="dev-platform"}[15m]) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Dev Platform pods are restarting.
