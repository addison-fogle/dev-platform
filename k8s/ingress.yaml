apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dev-platform
  namespace: dev-platform
fix imagespec:
  ingressClassName: nginx
  rules:
    - host: dev-platform.local
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
